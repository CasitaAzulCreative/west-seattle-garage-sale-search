<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>West Seattle Garage Sales</title>
    <link rel="stylesheet" href="./styles.css" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      crossorigin=""
    />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div class="hero-topbar">
          <a class="contact-link" href="mailto:Nikki@CasitaAzulCreative.com">Nikki@CasitaAzulCreative.com</a>
          <a
            class="social-link"
            href="https://www.instagram.com/casitaazulcreative/"
            target="_blank"
            rel="noreferrer"
            aria-label="Visit Casita Azul Creative on Instagram"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="3.5" y="3.5" width="17" height="17" rx="5"></rect>
              <circle cx="12" cy="12" r="4.25"></circle>
              <circle cx="17.5" cy="6.5" r="1.2"></circle>
            </svg>
          </a>
        </div>
        <div class="logo-lockup">
          <img
            class="brand-logo"
            src="./wscgs-logo.png"
            alt="WSCGS"
          />
          <p class="hero-text">
            Search the West Seattle Community Garage Sale 2026.
            <a
              href="https://westseattleblog.com/wsgaragesaledaymap"
              target="_blank"
              rel="noreferrer"
            >Click here to visit their official website.</a>
          </p>
        </div>
      </header>

      <main class="app-frame">
        <section class="control-panel">
          <label class="search-field">
            <span class="visually-hidden">Search garage sales</span>
            <input
              id="searchInput"
              type="search"
              placeholder="Search West Seattle garage sales"
              autocomplete="off"
            />
          </label>

          <div class="panel-actions">
            <button id="searchButton" class="action-button" type="button">Search Sales</button>
            <button id="viewKeywordButton" class="action-button" type="button">View By Keyword</button>
            <button id="viewMapButton" class="action-button" type="button">Map View</button>
            <button id="viewTableButton" class="action-button" type="button">View All Table</button>
            <button id="viewCardsButton" class="action-button" type="button">Card View</button>
            <button id="clearButton" class="action-button" type="button">Clear</button>
          </div>

          <div class="panel-row">
            <label class="select-field">
              <span>Sort results</span>
              <select id="sortSelect">
                <option value="relevance">Best match</option>
                <option value="address">Address</option>
                <option value="place">Place name</option>
              </select>
            </label>
          </div>

          <div class="result-meta">
            <p id="resultSummary">Loading sales…</p>
            <p class="index-meta">
              <span id="salesCount">0</span> sales indexed • <span id="keywordCount">0</span> keyword filters
            </p>
          </div>
        </section>

        <section id="keywordPanel" class="keyword-panel is-hidden">
          <div class="keyword-panel-header">
            <h2>View by keyword</h2>
            <p>Tap a keyword tab to instantly filter the sale list.</p>
          </div>
          <div id="keywordChips" class="keyword-chip-grid" aria-label="Keyword filters"></div>
        </section>

        <section class="results-panel">
          <div id="results" class="results-grid"></div>
          <div id="mapView" class="map-view is-hidden">
            <div class="map-shell">
              <p id="mapStatus" class="map-status">Map results will appear here.</p>
              <div id="mapCanvas" class="map-canvas" aria-label="Map of matching garage sales"></div>
            </div>
          </div>
          <div id="tableView" class="table-view is-hidden">
            <div class="table-shell">
              <table class="results-table">
                <thead>
                  <tr>
                    <th><button class="table-sort" type="button" data-sort-key="place">Place Name</button></th>
                    <th><button class="table-sort" type="button" data-sort-key="address">Address</button></th>
                    <th><button class="table-sort" type="button" data-sort-key="keywords">Keywords</button></th>
                    <th><button class="table-sort" type="button" data-sort-key="description">Description</button></th>
                    <th>Map</th>
                  </tr>
                </thead>
                <tbody id="resultsTableBody"></tbody>
              </table>
            </div>
          </div>
        </section>
      </main>
    </div>

    <template id="saleCardTemplate">
      <article class="sale-card">
        <div class="sale-card-top">
          <div class="sale-heading">
            <p class="sale-address"></p>
            <h3 class="sale-title"></h3>
          </div>
          <a class="map-link" target="_blank" rel="noreferrer">Open map</a>
        </div>
        <p class="sale-description"></p>
        <div class="sale-keywords"></div>
      </article>
    </template>

    <script src="./sales-data.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="./app.js"></script>
  </body>
</html>
